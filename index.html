<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DELTA FORCE - 多区域物资翻牌</title>
  <style>
    :root {
      --text: #eaf4ff;
      --muted: #90a8c3;
      --accent: #86c8ff;
      --line: rgba(108, 155, 219, 0.26);
      --card-w: min(28vw, 180px);
      --card-h: calc(var(--card-w) * 1.38);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 20% 18%, rgba(29, 77, 128, 0.32), transparent 28%),
        radial-gradient(circle at 80% 12%, rgba(39, 102, 77, 0.20), transparent 24%),
        linear-gradient(180deg, #09111b 0%, #06090f 100%);
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 95%);
      pointer-events: none;
      opacity: 0.4;
    }

    .hud {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      padding: 24px 16px 42px;
    }

    .title-box {
      position: absolute;
      top: 20px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      z-index: 5;
      pointer-events: none;
    }

    .label-panel {
      padding: 10px 14px;
      background: linear-gradient(180deg, rgba(16, 28, 44, 0.82), rgba(8, 13, 21, 0.72));
      border: 1px solid var(--line);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03), 0 10px 30px rgba(0,0,0,0.25);
      backdrop-filter: blur(8px);
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);
    }

    .label-panel strong {
      display: block;
      font-size: 14px;
      letter-spacing: 0.24em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .label-panel span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .toolbar {
      position: absolute;
      top: 82px;
      right: 16px;
      z-index: 6;
    }

    .codex-button,
    .arrow-button,
    .map-button,
    .codex-close {
      cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease, opacity 0.18s ease;
    }

    .codex-button:hover,
    .arrow-button:hover,
    .map-button:hover,
    .codex-close:hover,
    .codex-button:focus-visible,
    .arrow-button:focus-visible,
    .map-button:focus-visible,
    .codex-close:focus-visible {
      transform: translateY(-2px);
      outline: none;
    }

    .codex-button {
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(141, 190, 255, 0.28);
      background: linear-gradient(180deg, rgba(16, 28, 44, 0.92), rgba(8, 13, 21, 0.82));
      color: var(--text);
      font-size: 12px;
      letter-spacing: 0.12em;
    }

    .map-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      width: 100%;
      min-height: calc(var(--card-h) + 24px);
      z-index: 2;
    }

    .arrow-button {
      width: 44px;
      height: 64px;
      border-radius: 12px;
      border: 1px solid rgba(141, 190, 255, 0.28);
      background: linear-gradient(180deg, rgba(19, 31, 48, 0.92), rgba(7, 10, 16, 0.82));
      color: #d7ecff;
      font-size: 26px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.28);
    }

    .map-button {
      width: var(--card-w);
      height: var(--card-h);
      padding: 0;
      position: relative;
      background: none;
      border: none;
      filter: drop-shadow(0 18px 30px rgba(0,0,0,0.38));
    }

    .shell,
    .card-face {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      overflow: hidden;
    }

    .tactical-frame {
      border: 1px solid rgba(141, 190, 255, 0.28);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04), inset 0 0 28px rgba(47, 110, 180, 0.12), 0 14px 35px rgba(0,0,0,0.35);
    }

    .shell {
      background: radial-gradient(circle at 50% 32%, rgba(78, 146, 220, 0.16), transparent 25%), linear-gradient(145deg, #090909, #111111 45%, #050505 100%);
    }

    .shell::before,
    .card-back::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 14px;
      background:
        linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%),
        linear-gradient(0deg, transparent 0%, rgba(255,255,255,0.02) 50%, transparent 100%),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0 2px, transparent 2px 10px);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .core {
      position: absolute;
      inset: 22px;
      border-radius: 14px;
      border: 1px solid rgba(151, 214, 255, 0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(180deg, rgba(18, 31, 46, 0.72), rgba(7, 11, 17, 0.35));
      padding: 10px;
    }

    .button-title {
      color: #dff1ff;
      font-size: clamp(18px, 3vw, 26px);
      font-weight: 800;
      letter-spacing: 0.18em;
      text-align: center;
      writing-mode: vertical-rl;
      text-orientation: upright;
      text-shadow: 0 0 16px rgba(122, 198, 255, 0.18);
      user-select: none;
    }

    .map-cost {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      color: #eaf4ff;
      background: rgba(10, 16, 26, 0.72);
      border: 1px solid rgba(141, 190, 255, 0.18);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .spawn-area {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(10px, 2.6vw, 26px);
      min-height: calc(var(--card-h) + 24px);
      perspective: 1400px;
    }

    .cards.hidden {
      display: none;
    }

    .game-card {
      width: var(--card-w);
      height: var(--card-h);
      position: relative;
      transform-style: preserve-3d;
      cursor: pointer;
      animation: popIn 0.56s cubic-bezier(0.2, 0.85, 0.25, 1);
      will-change: transform, opacity;
      --spark: rgba(134, 200, 255, 0.95);
      --spark-soft: rgba(134, 200, 255, 0.34);
      --spark-trail: rgba(134, 200, 255, 0.18);
    }

    .game-card:nth-child(1) { animation-delay: 0.02s; }
    .game-card:nth-child(2) { animation-delay: 0.09s; }
    .game-card:nth-child(3) { animation-delay: 0.16s; }

    .card-inner {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transition: transform 0.72s cubic-bezier(0.2, 0.75, 0.2, 1);
    }

    .game-card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .card-back {
      background: linear-gradient(145deg, #000000, #131313 45%, #070707 100%);
    }

    .card-front {
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 14px 12px 14px;
      color: #0c1116;
      text-align: center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.16);
    }

    .card-front::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 14px;
      border: 1px solid rgba(12, 17, 24, 0.12);
      pointer-events: none;
    }

    .card-topline {
      width: 100%;
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      z-index: 1;
      opacity: 0;
      transform: translateY(-6px) translateZ(6px);
      transition: opacity 0.28s ease, transform 0.28s ease;
      transition-delay: 0.08s;
    }

    .icon-wrap {
      position: relative;
      z-index: 1;
      width: 72%;
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 10px 10px rgba(0,0,0,0.18));
      transition: transform 0.34s ease, opacity 0.34s ease;
      transform: translateZ(6px);
    }

    .item-name {
      position: relative;
      z-index: 1;
      width: 100%;
      padding: 10px 8px 0;
      font-size: clamp(13px, 1.8vw, 16px);
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #0d1622;
      text-shadow: 0 1px 0 rgba(255,255,255,0.15);
      opacity: 0;
      transform: translateY(8px) translateZ(6px);
      transition: opacity 0.32s ease, transform 0.32s ease;
      transition-delay: 0.18s;
      white-space: nowrap;
    }

    .game-card.flipped .item-name,
    .game-card.flipped .card-topline {
      opacity: 1;
      transform: translateY(0) translateZ(6px);
    }

    .game-card.flipped .icon-wrap {
      transform: scale(1.03) translateZ(6px);
    }

    .rarity-tag {
      position: absolute;
      right: 12px;
      bottom: 12px;
      font-size: 10px;
      letter-spacing: 0.16em;
      opacity: 0.58;
      transform: translateZ(6px);
    }

    .game-card.removing {
      pointer-events: none;
      transform-origin: center bottom;
      animation:
        burnAway 0.78s cubic-bezier(0.22, 0.7, 0.22, 1) forwards,
        emberShake 0.18s linear 4;
    }

    .game-card.removing .card-inner {
      animation: charTilt 0.78s ease-out forwards;
    }

    .spawn-fx {
      position: absolute;
      inset: -16%;
      pointer-events: none;
      overflow: visible;
      z-index: 5;
      mix-blend-mode: screen;
      opacity: 0;
      animation: spawnFxReveal 0.8s ease-out forwards;
    }

    .spawn-halo,
    .spawn-core,
    .spawn-rays,
    .spawn-glow {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
    }

    .spawn-halo {
      width: 104%;
      height: 74%;
      border: 1px solid var(--spark-soft);
      box-shadow: 0 0 20px var(--spark-soft), inset 0 0 18px rgba(255,255,255,0.16);
      animation: haloPulse 0.78s cubic-bezier(0.18, 0.8, 0.32, 1) forwards;
    }

    .spawn-core {
      width: 44%;
      height: 32%;
      background: radial-gradient(circle, rgba(255,255,255,0.92) 0%, var(--spark) 34%, rgba(255,255,255,0) 78%);
      filter: blur(2px);
      animation: coreFlash 0.6s ease-out forwards;
    }

    .spawn-glow {
      width: 130%;
      height: 88%;
      background: radial-gradient(circle, rgba(255,255,255,0.16) 0%, var(--spark-soft) 30%, rgba(255,255,255,0) 72%);
      filter: blur(12px);
      animation: glowFade 0.92s ease-out forwards;
    }

    .spawn-rays {
      width: 128%;
      height: 96%;
      background: conic-gradient(from 0deg, rgba(255,255,255,0) 0deg, var(--spark-trail) 16deg, rgba(255,255,255,0) 36deg, rgba(255,255,255,0) 88deg, var(--spark-trail) 100deg, rgba(255,255,255,0) 126deg, rgba(255,255,255,0) 188deg, var(--spark-trail) 206deg, rgba(255,255,255,0) 226deg, rgba(255,255,255,0) 276deg, var(--spark-trail) 292deg, rgba(255,255,255,0) 314deg, rgba(255,255,255,0) 360deg);
      filter: blur(1px);
      animation: raysSpin 0.92s ease-out forwards;
    }

    .spark {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 10px;
      height: 10px;
      margin: -5px 0 0 -5px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.98) 0%, var(--spark) 42%, rgba(255,255,255,0) 76%);
      box-shadow: 0 0 10px var(--spark), 0 0 18px var(--spark-soft);
      animation: sparkBurst 0.82s cubic-bezier(0.16, 0.78, 0.24, 1) forwards;
      animation-delay: var(--delay, 0s);
      transform: rotate(var(--angle)) translateY(0) scale(0.5);
    }

    .spark::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 3px;
      height: 22px;
      transform: translate(-50%, -85%);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(255,255,255,0));
      opacity: 0.66;
    }

    .burn-layer {
      position: absolute;
      inset: -4%;
      pointer-events: none;
      opacity: 0;
      overflow: hidden;
      border-radius: calc(var(--radius) + 4px);
      z-index: 6;
      mix-blend-mode: screen;
    }

    .game-card.removing .burn-layer {
      opacity: 1;
    }

    .burn-mask,
    .heat-haze,
    .ash-cloud,
    .ember,
    .flame {
      position: absolute;
      pointer-events: none;
    }

    .burn-mask {
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(circle at 50% 100%, rgba(255, 242, 186, 0.92) 0 10%, rgba(255, 162, 52, 0.9) 16%, rgba(255, 74, 21, 0.88) 28%, rgba(25, 9, 5, 0.96) 42%, rgba(6, 4, 4, 0.98) 58%, transparent 72%),
        linear-gradient(180deg, transparent 0 18%, rgba(0, 0, 0, 0.1) 38%, rgba(10, 5, 3, 0.88) 74%, rgba(3, 3, 3, 1) 100%);
      opacity: 0;
      transform-origin: center bottom;
      filter: blur(1px) saturate(1.35);
    }

    .game-card.removing .burn-mask {
      animation: burnMaskSweep 0.78s cubic-bezier(0.18, 0.72, 0.2, 1) forwards;
    }

    .heat-haze {
      inset: -10%;
      background:
        radial-gradient(circle at 50% 100%, rgba(255, 172, 76, 0.28) 0 18%, rgba(255, 110, 44, 0.18) 30%, rgba(255,255,255,0) 56%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.06) 0 2px, rgba(255,255,255,0) 2px 10px);
      opacity: 0;
      filter: blur(7px);
    }

    .game-card.removing .heat-haze {
      animation: heatHazeLift 0.72s ease-out forwards;
    }

    .ash-cloud {
      left: 12%;
      right: 12%;
      bottom: 6%;
      height: 34%;
      background: radial-gradient(circle at 50% 60%, rgba(255, 178, 118, 0.32) 0 12%, rgba(75, 48, 43, 0.42) 30%, rgba(0, 0, 0, 0) 72%);
      filter: blur(10px);
      opacity: 0;
    }

    .game-card.removing .ash-cloud {
      animation: ashBloom 0.68s ease-out forwards;
    }

    .flame {
      bottom: -12px;
      width: 30%;
      aspect-ratio: 0.62 / 1;
      background: radial-gradient(circle at 50% 72%, rgba(255,245,182,0.98) 0 14%, rgba(255,199,102,0.96) 24%, rgba(255,138,42,0.94) 42%, rgba(255,72,18,0.82) 72%, rgba(255,0,0,0) 100%);
      border-radius: 50% 50% 55% 55%;
      filter: blur(1.4px);
      transform-origin: bottom center;
      animation: flameRise 0.62s ease-out forwards;
    }

    .flame::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 12%;
      width: 36%;
      height: 46%;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(circle at 50% 60%, rgba(255,255,255,0.95), rgba(255,224,140,0.6) 48%, rgba(255,255,255,0) 100%);
      filter: blur(1px);
      opacity: 0.78;
    }

    .flame.f1 { left: 2%; animation-delay: 0s; }
    .flame.f2 { left: 22%; width: 26%; animation-delay: 0.05s; }
    .flame.f3 { left: 40%; width: 34%; animation-delay: 0.02s; }
    .flame.f4 { left: 64%; width: 24%; animation-delay: 0.08s; }
    .flame.f5 { left: 78%; width: 20%; animation-delay: 0.12s; }

    .ember {
      left: 50%;
      bottom: 12%;
      width: 8px;
      height: 8px;
      margin-left: -4px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.95) 0 22%, rgba(255,181,78,0.98) 34%, rgba(255,102,25,0.82) 60%, rgba(255,102,25,0) 100%);
      box-shadow: 0 0 12px rgba(255, 144, 50, 0.62);
      opacity: 0;
      transform: translate3d(0, 0, 0) scale(0.4);
      animation: emberFloat 0.82s cubic-bezier(0.16, 0.78, 0.24, 1) forwards;
      animation-delay: var(--delay, 0s);
    }

    .game-card[data-rarity="common"] {
      --spark: rgba(164, 228, 255, 0.88);
      --spark-soft: rgba(175, 230, 255, 0.34);
      --spark-trail: rgba(196, 235, 255, 0.18);
    }

    .game-card[data-rarity="standard"] {
      --spark: rgba(134, 244, 188, 0.94);
      --spark-soft: rgba(118, 210, 166, 0.32);
      --spark-trail: rgba(123, 234, 183, 0.18);
    }

    .game-card[data-rarity="recon"] {
      --spark: rgba(124, 191, 255, 0.94);
      --spark-soft: rgba(92, 169, 255, 0.34);
      --spark-trail: rgba(133, 203, 255, 0.18);
    }

    .game-card[data-rarity="rare"] {
      --spark: rgba(196, 142, 255, 0.96);
      --spark-soft: rgba(174, 114, 255, 0.34);
      --spark-trail: rgba(207, 166, 255, 0.2);
    }

    .game-card[data-rarity="gold"] {
      --spark: rgba(255, 218, 118, 0.98);
      --spark-soft: rgba(255, 204, 95, 0.34);
      --spark-trail: rgba(255, 225, 152, 0.2);
    }

    .game-card[data-rarity="epic"],
    .game-card[data-rarity="legendary"] {
      --spark: rgba(255, 106, 126, 0.98);
      --spark-soft: rgba(255, 82, 106, 0.34);
      --spark-trail: rgba(255, 165, 184, 0.2);
    }

    .bg-white { background: linear-gradient(180deg, #fcfcfc 0%, #e7eaee 100%); }
    .bg-green { background: linear-gradient(180deg, #78b98f 0%, #497a59 100%); }
    .bg-blue  { background: linear-gradient(180deg, #78a6d7 0%, #406182 100%); }
    .bg-purple{ background: linear-gradient(180deg, #9d84cb 0%, #61467f 100%); }
    .bg-gold  { background: linear-gradient(180deg, #f4d97d 0%, #bf9434 100%); }
    .bg-red   { background: linear-gradient(180deg, #d86d6d 0%, #962d2d 100%); }

    .icon-svg {
      width: 100%;
      height: 100%;
    }

    .icon-svg .s-dark { fill: rgba(13,19,28,0.92); }
    .icon-svg .s-mid { fill: rgba(24,36,48,0.78); }
    .icon-svg .s-light { fill: rgba(255,255,255,0.82); }
    .icon-svg .stroke { stroke: rgba(13,19,28,0.92); stroke-width: 4; stroke-linejoin: round; stroke-linecap: round; fill: none; }

    .hint {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-align: center;
      padding: 10px 14px;
      background: rgba(7,11,18,0.42);
      border: 1px solid rgba(112,156,212,0.18);
      border-radius: 999px;
      backdrop-filter: blur(4px);
      max-width: calc(100vw - 24px);
    }

    .toast {
      position: fixed;
      left: 50%;
      top: 88px;
      transform: translateX(-50%);
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(116,12,12,0.88);
      color: #ffd7d7;
      border: 1px solid rgba(255,98,98,0.28);
      box-shadow: 0 10px 24px rgba(0,0,0,0.25);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
    }

    .codex-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5,8,14,0.72);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
      padding: 18px;
    }

    .codex-overlay.open {
      display: flex;
    }

    .codex-panel {
      width: min(920px, 100%);
      max-height: min(84vh, 860px);
      overflow: auto;
      background: linear-gradient(180deg, rgba(13,21,34,0.96), rgba(7,10,17,0.96));
      border: 1px solid rgba(141,190,255,0.24);
      border-radius: 22px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.45);
      padding: 20px;
    }

    .codex-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .codex-title {
      font-size: 20px;
      letter-spacing: 0.14em;
      color: #dff1ff;
      font-weight: 800;
    }

    .codex-close {
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid rgba(141,190,255,0.22);
      background: rgba(15,25,39,0.9);
      color: #dff1ff;
    }

    .codex-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 12px;
    }

    .codex-item {
      background: linear-gradient(180deg, rgba(26,19,22,0.95), rgba(14,9,11,0.95));

    function pickLoot(table) {
      const totalWeight = table.reduce((sum, item) => sum + item.weight, 0);
      let roll = Math.random() * totalWeight;
      for (const item of table) {
        roll -= item.weight;
        if (roll <= 0) return item;
      }
      return table[table.length - 1];
    }

    function getAudioCtx() {
      if (!audioCtx) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return null;
        audioCtx = new AudioContextClass();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function tone({ type = 'sine', frequency = 440, start = 0, duration = 0.12, gain = 0.05, endFrequency = frequency }) {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const vol = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(frequency, ctx.currentTime + start);
      osc.frequency.exponentialRampToValueAtTime(Math.max(30, endFrequency), ctx.currentTime + start + duration);
      vol.gain.setValueAtTime(0.0001, ctx.currentTime + start);
      vol.gain.exponentialRampToValueAtTime(gain, ctx.currentTime + start + 0.015);
      vol.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + duration);
      osc.connect(vol).connect(ctx.destination);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + duration + 0.02);
    }

    function noiseBurst({ duration = 0.2, gain = 0.04 }) {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const buffer = ctx.createBuffer(1, Math.floor(ctx.sampleRate * duration), ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
      }
      const src = ctx.createBufferSource();
      const filter = ctx.createBiquadFilter();
      const vol = ctx.createGain();
      filter.type = 'lowpass';
      filter.frequency.value = 1200;
      src.buffer = buffer;
      vol.gain.setValueAtTime(0.0001, ctx.currentTime);
      vol.gain.exponentialRampToValueAtTime(gain, ctx.currentTime + 0.02);
      vol.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
      src.connect(filter).connect(vol).connect(ctx.destination);
      src.start();
    }

        clock: `<svg class="icon-svg" viewBox="0 0 100 100"><rect x="34" y="18" width="32" height="60" rx="10" class="s-dark"></rect><circle cx="50" cy="46" r="14" class="s-light"></circle><circle cx="50" cy="46" r="2.8" class="s-dark"></circle><path d="M50 46 L50 37" class="stroke"></path><path d="M50 46 L58 50" class="stroke"></path></svg>`,
        rolex: `<svg class="icon-svg" viewBox="0 0 100 100"><rect x="42" y="12" width="16" height="16" rx="6" class="s-mid"></rect><rect x="42" y="72" width="16" height="16" rx="6" class="s-mid"></rect><circle cx="50" cy="50" r="22" class="s-light"></circle><circle cx="50" cy="50" r="16" class="s-mid"></circle><path d="M50 50 L50 40" class="stroke"></path><path d="M50 50 L58 55" class="stroke"></path></svg>`,
        goldbar: `<svg class="icon-svg" viewBox="0 0 100 100"><path d="M24 60 L38 34 H68 L54 60 Z" class="s-light"></path><path d="M54 60 L68 34 L80 60 Z" class="s-mid"></path><path d="M24 60 H80 L72 72 H32 Z" class="s-dark"></path></svg>`,
        gazelle: `<svg class="icon-svg" viewBox="0 0 100 100"><path d="M30 61 C40 49, 54 45, 68 49 C72 53, 73 58, 71 63 C60 69, 45 71, 32 69 Z" class="s-light"></path><path d="M63 42 C64 29, 69 23, 74 18" class="stroke"></path><path d="M57 42 C55 30, 51 24, 46 18" class="stroke"></path></svg>`,
        shell: `<svg class="icon-svg" viewBox="0 0 100 100"><path d="M44 18 H56 V62 C56 74, 44 74, 44 62 Z" class="s-light"></path><path d="M44 62 H56 V76 H44 Z" class="s-mid"></path></svg>`,
        reactor: `<svg class="icon-svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="10" class="s-dark"></circle><path d="M50 23 C63 23, 70 32, 70 42 C62 46, 56 50, 50 50 C48 41, 45 34, 50 23 Z" class="s-light"></path><path d="M28 61 C22 49, 26 39, 34 34 C42 38, 48 41, 50 50 C42 54, 35 59, 28 61 Z" class="s-light"></path><path d="M72 61 C58 65, 48 61, 44 53 C48 45, 51 40, 50 50 C57 51, 65 55, 72 61 Z" class="s-light"></path></svg>`,
        champagne: `<svg class="icon-svg" viewBox="0 0 100 100"><path d="M36 20 H64 C64 42 59 52 50 58 C41 52 36 42 36 20 Z" class="s-light"></path><path d="M50 58 V75" class="stroke"></path><path d="M42 80 H58" class="stroke"></path></svg>`,
        bust: `<svg class="icon-svg" viewBox="0 0 100 100"><circle cx="50" cy="32" r="13" class="s-light"></circle><path d="M34 60 C39 48, 61 48, 66 60 L71 76 H29 Z" class="s-mid"></path></svg>`,
        gramophone: `<svg class="icon-svg" viewBox="0 0 100 100"><path d="M61 20 C79 20, 82 44, 66 49 C56 52, 48 47, 44 41 C50 33, 54 28, 61 20 Z" class="s-light"></path><rect x="44" y="43" width="8" height="16" class="s-mid"></rect><rect x="32" y="59" width="36" height="14" rx="3" class="s-dark"></rect></svg>`,
        ifv: `<svg class="icon-svg" viewBox="0 0 100 100"><rect x="26" y="47" width="42" height="18" rx="6" class="s-dark"></rect><rect x="44" y="39" width="18" height="10" rx="3" class="s-mid"></rect><rect x="58" y="42" width="18" height="4" rx="2" class="s-light"></rect><circle cx="36" cy="69" r="7" class="s-light"></circle><circle cx="50" cy="69" r="7" class="s-light"></circle><circle cx="64" cy="69" r="7" class="s-light"></circle></svg>`,
        robot: `<svg class="icon-svg" viewBox="0 0 100 100"><circle cx="50" cy="52" r="22" class="s-light"></circle><circle cx="42" cy="50" r="4" class="s-dark"></circle><circle cx="58" cy="50" r="4" class="s-dark"></circle><path d="M38 61 Q50 68 62 61" class="stroke"></path><path d="M50 20 V30" class="stroke"></path></svg>`,
        squarecoin: `<svg class="icon-svg" viewBox="0 0 100 100"><rect x="25" y="25" width="50" height="50" rx="10" class="s-light"></rect><rect x="40" y="40" width="20" height="20" rx="4" class="s-mid"></rect><path d="M25 50 H75" class="stroke" opacity="0.4"></path></svg>`,
        crown: `<svg class="icon-svg" viewBox="0 0 100 100"><path d="M24 68 L32 35 L49 52 L66 31 L76 68 Z" class="s-light"></path><rect x="26" y="68" width="48" height="10" rx="3" class="s-mid"></rect></svg>`,
        board: `<svg class="icon-svg" viewBox="0 0 100 100"><rect x="26" y="26" width="48" height="48" rx="4" class="s-light"></rect><path d="M42 26 V74 M58 26 V74 M26 42 H74 M26 58 H74" class="stroke"></path></svg>`,
        heartgem: `<svg class="icon-svg" viewBox="0 0 100 100"><path d="M50 79 L24 48 C17 39, 20 24, 34 22 C42 21, 47 25, 50 31 C53 25, 58 21, 66 22 C80 24, 83 39, 76 48 Z" class="s-light"></path><circle cx="50" cy="51" r="9" class="s-mid"></circle></svg>`
      };
      return icons[type] || `<div style="font-size:28px;color:#fff">?</div>`;
    }

    function getRarityToken(item) {
      if (item.bg === 'bg-red') return item.rarity === '传说' ? 'legendary' : 'epic';
      if (item.bg === 'bg-gold') return 'gold';
      if (item.bg === 'bg-purple') return 'rare';
      if (item.bg === 'bg-blue') return 'recon';
      if (item.bg === 'bg-green') return 'standard';
      return 'common';
    }

    function spawnFxMarkup() {
      const particleConfig = [
        ['-80deg', '-108px', '0s'],
        ['-42deg', '-126px', '0.04s'],
        ['-14deg', '-98px', '0.01s'],
        ['18deg', '-132px', '0.06s'],
        ['48deg', '-112px', '0.02s'],
        ['86deg', '-120px', '0.08s'],
        ['122deg', '-96px', '0.03s'],
        ['152deg', '-128px', '0.07s'],
        ['196deg', '-106px', '0.05s'],
        ['228deg', '-122px', '0.09s'],
        ['264deg', '-100px', '0.02s'],
        ['302deg', '-130px', '0.06s']
      ];
      const sparks = particleConfig.map(([angle, travel, delay]) => `
        <span class="spark" style="--angle:${angle};--travel:${travel};--delay:${delay};"></span>
      `).join('');
      return `
        <div class="spawn-fx" aria-hidden="true">
          <span class="spawn-glow"></span>
          <span class="spawn-rays"></span>
          <span class="spawn-halo"></span>
          <span class="spawn-core"></span>
          ${sparks}
        </div>
      `;
    }


    function spawnBurnEmbers(card) {
      const burnLayer = card.querySelector('.burn-layer');
      if (!burnLayer) return;
      burnLayer.querySelectorAll('.ember').forEach((ember) => ember.remove());
      const emberCount = 14;
      for (let i = 0; i < emberCount; i += 1) {
        const ember = document.createElement('span');
        ember.className = 'ember';
        const angle = `${Math.round(Math.random() * 36 - 18)}deg`;
        const x = `${Math.round(Math.random() * 120 - 60)}px`;
        const y = `${-70 - Math.round(Math.random() * 92)}px`;
        const delay = `${(Math.random() * 0.18).toFixed(2)}s`;
        const size = `${5 + Math.round(Math.random() * 7)}px`;
        ember.style.setProperty('--angle', angle);
        ember.style.setProperty('--x', x);
        ember.style.setProperty('--y', y);
        ember.style.setProperty('--delay', delay);
        ember.style.width = size;
        ember.style.height = size;
        burnLayer.appendChild(ember);
      }
    }

    function renderCodex() {
      codexGrid.innerHTML = '';
      RED_ITEMS.forEach((item) => {
        const unlocked = discoveredRedItems.has(item.name);
        const div = document.createElement('article');
        div.className = `codex-item${unlocked ? '' : ' locked'}`;
        if (unlocked) {
          div.innerHTML = `
            <div class="codex-icon">${iconMarkup(item.icon)}</div>
            <div class="codex-name">${item.name}</div>
            <div class="codex-price">${item.coins} 哈弗币</div>
          `;
        } else {
          div.innerHTML = `
            <div class="codex-icon">???</div>
            <div class="codex-name">???</div>
            <div class="codex-price">???</div>
          `;
        }
        codexGrid.appendChild(div);
      });
    }

    function createCard(item) {
      const card = document.createElement('article');
      card.className = 'game-card';
      card.dataset.state = 'back';
      card.dataset.counted = 'false';
      card.dataset.rarity = getRarityToken(item);
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', `${item.name} 卡牌`);

      card.innerHTML = `
        ${spawnFxMarkup()}
        <div class="card-inner">
          <div class="card-face card-back tactical-frame"></div>
          <div class="card-face card-front tactical-frame ${item.bg}" lang="zh-CN">
            <div class="card-topline"><span>LOOT</span><span>${item.rarity}</span></div>
            <div class="icon-wrap">${iconMarkup(item.icon)}</div>
            <div class="item-name">${item.name}</div>
            <div class="rarity-tag">TAC-SUPPLY</div>
          </div>
          <div class="burn-layer" aria-hidden="true">
            <span class="burn-mask"></span>
            <span class="heat-haze"></span>
            <span class="ash-cloud"></span>
            <span class="flame f1"></span>
            <span class="flame f2"></span>
            <span class="flame f3"></span>
            <span class="flame f4"></span>
            <span class="flame f5"></span>
          </div>
        </div>
      `;

      const activate = () => {
        if (card.classList.contains('removing')) return;
        if (card.dataset.state === 'back') {
          card.dataset.state = 'front';
          card.classList.add('flipped');
          playFlipSound();
          if (card.dataset.counted === 'false') {
            pendingCoins += item.coins;
            card.dataset.counted = 'true';
          }
          if (item.bg === 'bg-red') {
            discoveredRedItems.add(item.name);
            renderCodex();
          }
        } else {
          card.dataset.state = 'gone';
          card.classList.add('removing');
          playBurnSound();
          spawnBurnEmbers(card);
          setTimeout(() => card.remove(), 820);
        }
      };

      card.addEventListener('click', activate);
      card.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          activate();
        }
      });

      const spawnFx = card.querySelector('.spawn-fx');
      if (spawnFx) {
        setTimeout(() => spawnFx.remove(), 980);
      }

      return card;
    }

    function enterCurrentMap() {
      const map = getCurrentMap();
      payoutPendingCoins();

      if (coinBalance < map.cost) {
        showToast('哈弗币不足');
        return;
      }

      if (map.cost > 0) {
        coinBalance -= map.cost;
        updateCoinUI();
      }

      cardsArea.innerHTML = '';
      const picks = [pickLoot(map.loot), pickLoot(map.loot), pickLoot(map.loot)];
      picks.forEach((item) => cardsArea.appendChild(createCard(item)));
      cardsArea.classList.remove('hidden');

      if (picks.some((item) => item.bg === 'bg-gold')) {
        setTimeout(playGoldSound, 180);
      }
      if (picks.some((item) => item.bg === 'bg-red')) {
        setTimeout(playRedSound, 320);
      }
    }

    drawButton.addEventListener('click', enterCurrentMap);
    prevMap.addEventListener('click', () => {
      currentMapIndex = (currentMapIndex - 1 + maps.length) % maps.length;
      updateMapUI();
    });
    nextMap.addEventListener('click', () => {
      currentMapIndex = (currentMapIndex + 1) % maps.length;
      updateMapUI();
    });

    codexButton.addEventListener('click', () => {
      renderCodex();
      codexOverlay.classList.add('open');
      codexOverlay.setAttribute('aria-hidden', 'false');
    });

    codexClose.addEventListener('click', () => {
      codexOverlay.classList.remove('open');
      codexOverlay.setAttribute('aria-hidden', 'true');
    });

    codexOverlay.addEventListener('click', (event) => {
      if (event.target === codexOverlay) {
        codexOverlay.classList.remove('open');
        codexOverlay.setAttribute('aria-hidden', 'true');
      }
    });

    updateCoinUI();
    updateMapUI();
    renderCodex();
  </script>
</body>
</html>
